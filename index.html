<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EastFront 2026 - WWII Hex Strategy Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>EastFront 2026</h1>
            <div class="game-info">
                <span id="current-player">Current Player: Axis</span>
                <span id="turn-counter">Turn: 1</span>
                <span id="phase-indicator">Phase: MOVE</span>
            </div>
        </header>

        <main>
            <div class="game-board">
                <canvas id="game-canvas" width="1200" height="800"></canvas>
            </div>

            <aside class="sidebar">
                <div class="panel">
                    <h3>Game Status</h3>
                    <p id="status-text">Welcome to EastFront 2026.  Select a unit to begin.</p>
                    <div id="phase-badge" class="phase-badge">MOVE</div>
                </div>

                <div class="panel">
                    <h3>Current selection</h3>
                    <div id="unit-info">
                        <p>None selected</p>
                    </div>
                </div>

                <div class="panel">
                    <h3>Game Control</h3>
                    <button id="end-turn-btn">End Turn</button>
                </div>
                <div class="panel">
                    <h3>Setup Control</h3>
                    <button id="reset-btn">Reset Game</button>
                    <button id="load-setup-btn">Load Setup File</button>
                    <button id="load-border-btn">Load Border File</button>
                </div>

                <div class="panel" id="map-key-panel">
                    <h3>Map Key</h3>
                    <div id="map-key"></div>
                </div>
            </aside>
        </main>
    </div>

    <script type="module" src="src/main.ts"></script>
</body>
</html>
